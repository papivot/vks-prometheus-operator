# kube-apiserver ServiceMonitor
# Scrapes the main Kubernetes API server via the built-in "kubernetes"
# Service in the default namespace. Uses the pod's ServiceAccount token
# and the cluster CA for TLS verification.
#
# NOTE (VKS): kube-controller-manager, kube-scheduler, etcd, and kube-proxy
# all bind to 127.0.0.1 only and cannot be scraped remotely.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-apiserver
  namespace: tanzu-system-monitoring
  labels:
    app.kubernetes.io/name: kube-apiserver
    app.kubernetes.io/component: control-plane
spec:
  jobLabel: component
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      component: apiserver
      provider: kubernetes
  endpoints:
    - port: https
      scheme: https
      tlsConfig:
        caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        serverName: kubernetes
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      interval: 30s
      # Drop high-frequency/high-cardinality apiserver metrics that inflate storage
      metricRelabelings:
        - action: drop
          regex: apiserver_request_duration_seconds_bucket;(0.15|0.2|0.3|0.35|0.4|0.45|0.6|0.7|0.8|0.9|1.25|1.5|1.75|2|3|3.5|4|4.5|6|7|8|9|15|25|40|50|60)
          sourceLabels: [__name__, le]
