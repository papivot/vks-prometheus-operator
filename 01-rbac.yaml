apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: tanzu-system-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  # Core resources needed to discover scrape targets
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - nodes/proxy
      - services
      - endpoints
      - pods
      - namespaces
      - configmaps
    verbs: ["get", "list", "watch"]
  # Non-resource URLs for scraping metrics endpoints
  - nonResourceURLs:
      - /metrics
      - /healthz
      - /readyz
      - /livez
      - /metrics/cadvisor
      - /metrics/resource
      - /metrics/probes
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: tanzu-system-monitoring
